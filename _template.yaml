# Vane Controller Profile Template
# Schema version: 0.2

meta:
  name: ""
  slug: ""
  manufacturer: ""
  version: null
  category: ""              # wind | mpe-surface | expressive | software | vane-native | standard-midi | cc-only
  schema_version: "0.2"
  status: stub              # stub | draft | complete | verified
  notes: null

connectivity:
  protocol: []              # standard-midi | mpe | midi-2 | osc | proprietary
  connection: []            # usb | bluetooth-midi | midi-din | virtual-midi | network-osc | ios-au | proprietary-usb
