# Vane Controller Profile — Korg nanoKONTROL2
# Schema version: 0.1

meta:
  name: Korg nanoKONTROL2
  slug: nanokontrol
  manufacturer: Korg
  version: "2"              # nanoKONTROL vs nanoKONTROL2; profile covers v2
  category: cc-only
  schema_version: "0.2"
  status: draft
  notes: >
    Slim USB control surface. 8 fader channels, each with fader, knob, and
    3 buttons (S/M/R). Transport buttons. No note output in normal use.
    Highly configurable via Korg Kontrol Editor software.
    The nanoKONTROL (v1) has a different default CC map; this profile
    covers v2.

connectivity:
  protocol:
    - standard-midi
  connection:
    - usb
  middleware_required: false
  middleware: []
  companion_app: Korg Kontrol Editor
  companion_app_platforms:
    - macos
    - windows

implementation:
  type: configurable
  config_method: companion-app
  notes: >
    All CC numbers, MIDI channel, and button behavior (toggle/momentary)
    configurable via Korg Kontrol Editor. Scenes can be stored on device.
    Factory default CC map documented below.

sends:
  notes: false              # Buttons can be configured to send notes, but not default
  note_range: null
  velocity: false
  velocity_resolution: null
  channel_pressure: false
  poly_pressure: false
  pitch_bend: false
  pitch_bend_range_semitones: null
  pitch_bend_range_configurable: false
  program_change: false
  clock: false
  sysex: false

  ccs:
    # Default factory map — all values configurable
    - cc: 0
      name: Fader 1
      description: Channel 1 fader
      resolution: 7bit
