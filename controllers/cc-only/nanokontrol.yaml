vane:
  profile_status: draft
  recommended_mappings:
    # Suggested Vane parameter layout — adapt as needed
    fader_1: dynamics        # Overall volume / breath equivalent
    fader_2: filter_cutoff
    fader_3: filter_resonance
    fader_4: reverb_mix
    fader_5: delay_mix
    fader_6: lfo_rate
    fader_7: lfo_depth
    fader_8: master_tune
    knob_1: oscillator_shape
    knob_2: oscillator_pitch
    knob_3: envelope_attack
    knob_4: envelope_decay
    knob_5: envelope_sustain
    knob_6: envelope_release
    knob_7: mod_depth
    knob_8: effects_param
  quirks:
    - >
        Faders are not motorized — position mismatch on preset load
        will cause jumps. Consider implementing a pickup/catch mode
        in Vane for CC parameters.
    - >
        Default CC map (0–7 for faders) overlaps with GM standard
        controller assignments. Remap in Kontrol Editor if conflicts arise.
  notes: >
    Straightforward CC controller. Primarily useful for parameter editing
    and live tweaking rather than expressive performance. Pairs well with
    a note-generating controller (e.g. Sylphyo or Exquis) in a split setup.
