meta:
  name: "Oddball"
  slug: oddball
  manufacturer: "Oddball"
  version: null
  category: cc-only
  schema_version: "0.2"
  status: stub
  notes: >
    Spherical percussion MIDI controller. Strike or shake the ball to send MIDI.
    Accelerometer and impact sensor data is mapped to CCs and/or notes depending
    on configuration. Functions as a gestural CC source, not a per-note expressive
    instrument — analogous to NanoKontrol in role (sends control data), different
    in physical interaction (motion/impact vs. faders/knobs).

